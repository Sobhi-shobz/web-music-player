<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player | #cl-web-music</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="player-card">
        <div class="song-info">
            <h2 id="title">Loading...</h2>
            <h3 id="artist">Artist Name</h3>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
        </div>

        <div class="controls">
            <button id="prev" class="btn"><i class="fas fa-backward"></i></button>
            <button id="play" class="btn main-btn"><i class="fas fa-play" id="play-icon"></i></button>
            <button id="next" class="btn"><i class="fas fa-forward"></i></button>
        </div>

        <div class="volume-box">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
            <i class="fas fa-volume-up"></i>
        </div>
    </div>

    <audio id="audio"></audio>

    <script src="script.js"></script>
</body>
</html>
